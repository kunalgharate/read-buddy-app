name: Code Quality

on:
  pull_request:

concurrency:
  group: code-quality-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        id: format
        run: |
          dart format --output=none --set-exit-if-changed . 2>&1 | tee format_output.txt || true
          if [ -s format_output.txt ] && grep -q "Changed" format_output.txt; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          fi

      - name: Run analyzer
        id: analyze
        run: |
          dart analyze --no-fatal-warnings 2>&1 | tee analyze_output.txt || true
          if grep -qE "info|warning|error" analyze_output.txt; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          fi

      - name: Run DCM
        id: dcm
        run: |
          dart pub global activate dart_code_metrics
          dart pub global run dart_code_metrics:metrics analyze lib --reporter=console 2>&1 | tee dcm_output.txt || true

      - name: Comment PR with suggestions
        if: steps.format.outputs.has_issues == 'true' || steps.analyze.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔍 Code Quality Report\n\n';

            const formatOutput = fs.readFileSync('format_output.txt', 'utf8').trim();
            if (formatOutput && formatOutput.includes('Changed')) {
              body += '### ⚠️ Formatting Issues\nRun `dart format .` to fix:\n```\n' + formatOutput + '\n```\n\n';
            }

            const analyzeOutput = fs.readFileSync('analyze_output.txt', 'utf8').trim();
            if (analyzeOutput) {
              body += '### 🔎 Analyzer Issues\n```\n' + analyzeOutput + '\n```\n\n';
            }

            const dcmOutput = fs.readFileSync('dcm_output.txt', 'utf8').trim();
            if (dcmOutput) {
              body += '### 📊 DCM Metrics\n```\n' + dcmOutput + '\n```\n\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
